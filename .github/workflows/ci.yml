name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm charts
        run: |
          for chart in charts/*/; do
            helm lint "$chart"
          done
